<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="16" ry="16" />
    </clipPath>
  </defs>
  <image
    width="64"
    height="64"
    preserveAspectRatio="none"
